<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráficos</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>Gráficos:</h1>
    <p class="subtitle">Fluxo diário e mensal registrado</p>
  </header>

  <hr class="divisor">

  <section class="grafico-secao" style="max-width: 70%; margin: 0 auto;">
    <h2>Entradas e Saídas — Últimas 24h</h2>
    <p class="grafico-descricao">Movimentação por hora do dia</p>
    <div class="grafico-container">
      <canvas id="grafico-horas"></canvas>
    </div>
  </section>

  <hr class="divisor">

  <section class="grafico-secao" style="max-width: 70%; margin: 0 auto;">
    <h2>Movimentação Total — Últimos 30 dias</h2>
    <p class="grafico-descricao">Total de entradas e saídas por dia</p>
    <div class="grafico-container">
      <canvas id="grafico-dias"></canvas>
    </div>
  </section>

  <nav class="navegacao">
    <a href="/membros.html">Membros</a>
    <a href="/">Dashboard</a>
    <a href="/graficos.html" class="ativo">Gráficos</a>
    <a href="/logs.html">Logs</a>
    <a href="/performance.html">Performance</a>
    <a href="/configuracao.html">Config</a>
    <a href="/changelog.html">Changelog</a>
  </nav>

  <script>
    const labels24h = Array.from({ length: 24 }, (_, i) => i + 'h');

    const labels30d = Array.from({ length: 30 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (29 - i));
      return d.getDate() + '/' + (d.getMonth() + 1);
    });

    // Gráfico de horas
    const ctxHoras = document.getElementById('grafico-horas').getContext('2d');
    const graficoHoras = new Chart(ctxHoras, {
      type: 'bar',
      data: {
        labels: labels24h,
        datasets: [
          {
            label: 'Entradas',
            data: new Array(24).fill(0),
            backgroundColor: 'rgba(46, 204, 113, 0.7)',
            borderColor: 'rgba(46, 204, 113, 1)',
            borderWidth: 1
          },
          {
            label: 'Saídas',
            data: new Array(24).fill(0),
            backgroundColor: 'rgba(231, 76, 60, 0.7)',
            borderColor: 'rgba(231, 76, 60, 1)',
            borderWidth: 1
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });

    // Gráfico de dias
    const ctxDias = document.getElementById('grafico-dias').getContext('2d');
    const graficoDias = new Chart(ctxDias, {
      type: 'line',
      data: {
        labels: labels30d,
        datasets: [
          {
            label: 'Movimentação',
            data: new Array(30).fill(0),
            backgroundColor: 'rgba(52, 152, 219, 0.2)',
            borderColor: 'rgba(52, 152, 219, 1)',
            borderWidth: 2,
            fill: true,
            tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { stepSize: 1 }
          }
        }
      }
    });

    // Busca e atualiza os dados
    async function atualizarGraficos() {
      try {
        const res  = await fetch('/api/graficos');
        const data = await res.json();

        graficoHoras.data.datasets[0].data = data.porHora.entradas;
        graficoHoras.data.datasets[1].data = data.porHora.saidas;
        graficoHoras.update();

        graficoDias.data.datasets[0].data = data.porDia;
        graficoDias.update();

      } catch (e) {
        console.error('Erro ao buscar dados dos gráficos:', e);
      }
    }

    atualizarGraficos();
    setInterval(atualizarGraficos, 10000); // atualiza a cada 10 segundos
  </script>

</body>
</html>
